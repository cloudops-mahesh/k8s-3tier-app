apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: {{ .Values.namespace }}
data:
  NODE_ENV: "production"
  PORT: "{{ .Values.backend.port }}"
  DB_HOST: "db-service"
  DB_PORT: "{{ .Values.database.port }}"
  DB_NAME: "{{ .Values.database.name }}"
  DB_USER: "{{ .Values.database.user }}"
  API_URL: "http://backend-service:{{ .Values.backend.port }}"
  LOG_LEVEL: "info"