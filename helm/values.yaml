namespace: production

frontend:
  image: frontend:v2
  replicas: 2
  port: 80
  hpa:
    minReplicas: 2
    maxReplicas: 8
    cpuThreshold: 70

backend:
  image: backend:v2
  replicas: 2
  port: 3000
  hpa:
    minReplicas: 2
    maxReplicas: 10
    cpuThreshold: 60

database:
  image: postgres:15
  port: 5432
  name: appdb
  user: postgres
  password: mypassword123
  storage: 1Gi

ingress:
  host: myapp.local